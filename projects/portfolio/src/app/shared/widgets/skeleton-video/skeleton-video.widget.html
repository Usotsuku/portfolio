<div class="skeleton-video" [class.skeleton-video--mobile]="isMobile()">
  @if (loading()) {
    <awp-skeleton shape="rect" width="100%" height="100%" borderRadius="0" />
  }
  <video
    [src]="src()"
    [class.video--loaded]="!loading()"
    [style.opacity]="loading() ? '0' : '1'"
    controls
    loop
    muted
    playsinline
    preload="metadata"
    (loadeddata)="onReady()"
    (error)="onReady()"
  ></video>
</div>
