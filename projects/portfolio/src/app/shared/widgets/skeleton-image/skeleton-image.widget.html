<div class="skeleton-image" [style.border-radius]="borderRadius()">
  @if (loading()) {
    <awp-skeleton shape="rect" width="100%" height="100%" [borderRadius]="borderRadius()" />
  }
  <img
    [src]="src()"
    [alt]="alt()"
    [style.object-fit]="objectFit()"
    [style.opacity]="loading() ? '0' : '1'"
    (load)="onLoad()"
    (error)="onError()"
  />
</div>
