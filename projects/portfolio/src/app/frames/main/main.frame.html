<div class="cursor-orbit" data-cursor-orbit aria-hidden="true"></div>

<header class="topbar">
  <a class="font-display topbar__brand awp-focus" href="#hero" aria-label="Aymane Wakach home">
    <span class="topbar__avatar"><awp-skeleton-image [src]="profile.pictureUrl" [alt]="profile.name" borderRadius="8px" /></span>
    <strong>Aymane Wakach</strong>
  </a>

  <div class="topbar__right">
    <nav class="topbar__nav" aria-label="Portfolio navigation">
      @for (item of menu; track item.fragment) {
        <a class="awp-focus" [href]="'#' + item.fragment">{{ item.label }}</a>
      }
    </nav>

    <button class="theme-toggle awp-focus" type="button" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (theme.isDark()) {
        <svg lucideSun [size]="18"></svg>
      } @else {
        <svg lucideMoon [size]="18"></svg>
      }
    </button>
  </div>
</header>

<main>
  <router-outlet />
</main>
